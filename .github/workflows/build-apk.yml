name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: "2.3.${{ github.run_number }}"
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.2

    - name: Install Android SDK Platform and Build Tools
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4.2.2
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Print version info
      run: echo "Building version ${{ env.VERSION_NAME }} (code ${{ env.VERSION_CODE }})"
    
    - name: Clean Gradle Build
      run: ./gradlew clean
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --refresh-dependencies
    
    - name: Generate Release Keystore
      run: |
        if [ ! -f loanmanager-release.keystore ]; then
          keytool -genkey -v -keystore loanmanager-release.keystore -alias loanmanager -keyalg RSA -keysize 2048 -validity 10000 -storepass loanmanager123 -keypass loanmanager123 -dname "CN=LoanManager"
        else
          echo "Keystore already exists, skipping generation"
        fi
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --refresh-dependencies
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: app-debug-v${{ env.VERSION_NAME }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: app-release-v${{ env.VERSION_NAME }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
